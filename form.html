<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="images/form.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Form</title>
</head>
<body>
    <form action="index.php" method="POST" enctype="multipart/form-data">
        <label for="Username">Username:</label>
        <input type="text" id="Username" placeholder="Spongebob" minlength="6" maxlength="15" required><br>

        <br>
        <label for="password">Password:</label>
        <input type="password" id="password" required>

        <br>
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="SSquarepants@gmail.com" required>

        <br>
        <br>
        <label for="Phone">Phone #:</label>
        <input type="tel" id="phone" placeholder="+91 1234567890" min="10" max="10">

        <br>
        <br>
        <label for="Birthday">Birthdate:</label>
        <input type="date" id="Birthday">

        <br>
        <br>
        <label for="Quantity">Quantity:</label>
        <input type="number" id="Quantity" min="0" max="99" value="1">

        <br>
        <br>
        <label for="title">Title:</label>
        <br>
        <br>
        <label for="Mr.">Mr. :</label>
        <input type="radio" id="Mr." value="Mr." name="title">
        <br>
        <br>
        <label for="Ms.">Ms. :</label>
        <input type="radio" id="Ms." value="Ms." name="title">
        <br>
        <br>
        <label for="PhD.">PhD :</label>
        <input type="radio" id="PhD." value="PhD." name="title">
        <br>
        <br>
        <label for="Payment">Payment:</label>
        <select id="Payment">
            <option value="Visa">Visa</option>
            <option value="Mastercard">Mastercard</option>
            <option value="Giftcard">Giftcard</option>
        </select>
        <br>
        <br>
        <label for="Subscribe">Subscribe:</label>
        <input type="checkbox" id="Subscribe">
        <br>
        <br>
        <label for="Comment">Comment:</label>
        <textarea id="Comment" rows="3" cols="25"></textarea>
        <br>
        <br>
        <label for="file">File:</label>
        <input type="file" id="file>" accept="image/png, image/jpeg">
        <br>
        <br>
        <input type="reset">
        <input type="submit">
    </form>
</body>
</html>
